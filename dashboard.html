<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0F0E0C">
<title>luunch — Restaurangdashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/dashboard.css">
</head>
<body>

<header>
  <a href="/" class="logo">luu<span>n</span>ch</a>
  <div class="header-tag">Dashboard</div>
</header>

<!-- LOGIN PAGE -->
<div class="page active" id="pageLogin">
  <a href="/" class="back-link">← Tillbaka till luunch.se</a>
  <div class="login-hero">
    <h1 id="authTitle">Välkommen<br>till din <em>dashboard</em></h1>
    <p id="authSub">Logga in för att hantera din restaurang.</p>
  </div>

  <div class="claim-context" id="claimContext" style="display:none"></div>

  <div id="formLogin">
    <label class="form-label">E-postadress</label>
    <input class="form-input" id="loginEmail" type="email" placeholder="din@restaurang.se">
    <label class="form-label">Lösenord</label>
    <input class="form-input" id="loginPassword" type="password" placeholder="••••••••">
    <button class="btn-primary" id="loginBtn" onclick="login()">Logga in</button>
    <button class="btn-secondary" onclick="showRegister()" type="button">Skapa konto</button>
    <div id="loginMsg"></div>
  </div>

  <div id="formRegister" style="display:none">
    <label class="form-label">E-postadress</label>
    <input class="form-input" id="regEmail" type="email" placeholder="din@restaurang.se">
    <label class="form-label">Lösenord</label>
    <input class="form-input" id="regPassword" type="password" placeholder="Minst 6 tecken">
    <label class="form-label">Bekräfta lösenord</label>
    <input class="form-input" id="regConfirm" type="password" placeholder="Skriv lösenordet igen">
    <button class="btn-primary" id="regBtn" onclick="register()">Skapa konto</button>
    <button class="btn-secondary" onclick="showLogin()" type="button">Har du redan konto? Logga in</button>
    <div id="regMsg"></div>
  </div>
</div>

<!-- DASHBOARD PAGE -->
<div class="page" id="pageDash">
  <div class="dash-greeting">
    <h2>Hej, <span id="dashName">Restaurang</span> 👋</h2>
    <p id="dashSub">Håll din sida uppdaterad så hittar fler gäster dig.</p>
  </div>

  <!-- TODAY'S MENU -->
  <div class="section-card">
    <div class="section-card-header">
      <div class="section-card-title">🍽️ Dagens meny</div>
      <div class="section-status missing" id="menuStatus">Ej tillagd</div>
    </div>
    <div id="dishesList"></div>
    <div class="dish-form" id="dishForm">
      <label class="form-label">Maträtt</label>
      <input class="form-input" id="dishDesc" type="text" placeholder="T.ex. Köttbullar med potatismos och lingon">
      <label class="form-label">Pris (kr)</label>
      <input class="form-input" id="dishPrice" type="number" placeholder="125">
      <button class="btn-primary" onclick="addDish()">+ Lägg till rätt</button>
    </div>
    <div id="menuMsg"></div>
  </div>

  <!-- OPENING HOURS -->
  <div class="section-card">
    <div class="section-card-header">
      <div class="section-card-title">🕐 Öppettider</div>
      <div class="section-status missing" id="hoursStatus">Ej tillagda</div>
    </div>
    <div class="hours-grid" id="hoursGrid"></div>
    <button class="btn-primary" onclick="saveHours()">Spara öppettider</button>
    <div id="hoursMsg"></div>
  </div>

  <div class="divider"></div>
  <button class="btn-logout" onclick="logout()">Logga ut</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/assets/ui.js"></script>
<script src="/assets/dashboard.js"></script>
</body>
</html>
